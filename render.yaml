services:
  - type: web
    name: ondine-landing
    runtime: static
    buildCommand: echo "No build step needed"
    staticPublishPath: ./src
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000
